<!doctype html>
<html lang="ru"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>noet</title>
<style>
  :root{
    --bg:#0a0a0d; --panel:#111118; --panel2:#16161f; --bd:#24242e; --bd2:#2f2f3a;
    --fg:#f1f1f5; --mut:#9595a3; --acc:#7c5cff; --acc2:#9d8bff; --ok:#3ddc97;
    --r:14px; --ring:0 0 0 3px rgba(124,92,255,.18);
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{background:radial-gradient(120% 75% at 50% -12%,#16121f 0%,transparent 58%) fixed,var(--bg);
    color:var(--fg);font:15px/1.55 -apple-system,system-ui,Segoe UI,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:36rem;margin:0 auto;padding:2.4rem 1.2rem 5rem}
  .top{display:flex;align-items:center;gap:.55rem;margin-bottom:.7rem}
  .top img{width:28px;height:28px}.top b{font-size:1.05rem;letter-spacing:.2px}
  .nav{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:1.6rem}
  .nav a{color:var(--mut);font-size:.86rem;text-decoration:none;padding:.32rem .7rem;border-radius:999px;border:1px solid transparent}
  .nav a:hover{color:var(--fg);border-color:var(--bd2)}
  .nav a.on{color:var(--fg);background:var(--panel2);border-color:var(--bd2)}
  .card{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--bd);
    border-radius:var(--r);padding:1.3rem;box-shadow:0 8px 30px rgba(0,0,0,.32);margin-bottom:1rem}
  h1{font-size:1.5rem;letter-spacing:-.3px;margin:0 0 .2em}
  .mut{color:var(--mut)}
  .phd{display:flex;align-items:center;gap:.9rem}
  .av{width:56px;height:56px;border-radius:50%;flex:0 0 56px}
  .dn{font-size:1.15rem;font-weight:650}.hd{color:var(--mut);font-size:.9rem}
  label{display:block;color:var(--mut);font-size:.82rem;margin:.9rem 0 .35rem}
  input,textarea{width:100%;background:var(--bg);border:1px solid var(--bd2);color:var(--fg);border-radius:11px;
    padding:.65rem .8rem;font:inherit;outline:none;transition:border-color .15s,box-shadow .15s}
  input:focus,textarea:focus{border-color:var(--acc);box-shadow:var(--ring)}
  input::placeholder,textarea::placeholder{color:#5a5a68}
  textarea{resize:vertical;min-height:7rem}textarea.code{font:13px/1.6 ui-monospace,monospace;min-height:12rem}
  .row{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap}
  button{border:0;border-radius:11px;padding:.62rem 1.1rem;font:inherit;font-weight:600;cursor:pointer;transition:background .15s,transform .04s}
  button:active{transform:translateY(1px)}
  .pri{background:var(--acc);color:#fff}.pri:hover{background:#6b4dff}
  .gho{background:var(--bg);border:1px solid var(--bd2);color:var(--fg)}.gho:hover{border-color:var(--acc)}
  .pri:disabled,.gho:disabled{opacity:.55;cursor:default}
  .seg{display:inline-flex;background:var(--bg);border:1px solid var(--bd2);border-radius:11px;padding:3px;gap:3px}
  .seg button{background:0;color:var(--mut);padding:.4rem .9rem;font-weight:600}
  .seg button.on{background:var(--acc);color:#fff}
  .name-row{display:flex}.name-row input{border-radius:11px 0 0 11px;border-right:0}
  .name-row .suf{display:flex;align-items:center;background:#1b1b24;border:1px solid var(--bd2);border-radius:0 11px 11px 0;padding:0 .85rem;color:var(--mut);font-weight:600}
  .pageurl{font-size:1.05rem;color:var(--acc2);font-weight:600}
  .msg{font-size:.9rem;margin-top:.7rem;min-height:1.1em}.msg.ok{color:var(--ok)}.msg.err{color:#ff7b8a}
  .msg a{color:var(--acc2)}
  .key{color:#56566a;font-size:.78rem;margin-top:1rem;font-family:ui-monospace,monospace;word-break:break-all}
  a{color:var(--acc2);text-decoration:none}a:hover{text-decoration:underline}
  .ed-bar{display:flex;align-items:center;gap:.8rem;margin-bottom:1rem}
  .ed-bar .sp{flex:1}
</style></head>
<body>
  <div class="wrap">
    <div class="top"><img src="logo.svg" alt=""><b>noet</b><span class="sp"></span>
      <a id="lpeople" href="#">Люди</a><a id="ldev" href="#">Разработчикам</a></div>
    <div id="app"><div class="card mut">загрузка…</div></div>
  </div>
<script type="module" src="app.js"></script>
</body></html>
