<!doctype html>
<html lang="ru"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Звонок · noet</title>
<style>
  :root{--bg:#0a0a0c;--bar:#121219;--card:#15151d;--bd:#23232c;--bd2:#2f2f3a;--fg:#ececf2;--mut:#8b8b98;--acc:#7c5cff;--acc2:#9d8bff;--ok:#34d399;--bad:#ff6b6b}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);font:15px/1.5 system-ui,-apple-system,Segoe UI,sans-serif}
  body{display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:.6rem;padding:.5rem .9rem;background:var(--bar);border-bottom:1px solid var(--bd);flex-shrink:0}
  header a{color:var(--mut);text-decoration:none;padding:.25rem .45rem;border-radius:8px;white-space:nowrap;cursor:pointer}
  header a:hover{color:var(--fg);background:#1c1c25}
  header .home{color:var(--acc2);font-weight:600}
  header .ttl{color:var(--fg);font-weight:600}
  header .cnt{color:var(--mut);font-size:.85rem}
  .sp{flex:1}
  #grid{flex:1;display:grid;gap:.5rem;padding:.6rem;min-height:0;overflow:auto;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));align-content:start}
  .tile{position:relative;background:#000;border:1px solid var(--bd);border-radius:12px;overflow:hidden;aspect-ratio:4/3;min-height:0}
  .tile video{width:100%;height:100%;object-fit:cover;background:#000;display:block}
  .tile.me video{transform:scaleX(-1)}
  .tile.me.sharing video{transform:none}
  .tile .lbl{position:absolute;left:.4rem;bottom:.4rem;background:rgba(0,0,0,.55);color:#fff;font-size:.78rem;
    padding:.15rem .5rem;border-radius:999px;max-width:80%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tile .novid{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#3a3a44;font-size:2.4rem}
  .tile .badge{position:absolute;right:.4rem;top:.4rem;display:flex;gap:.25rem}
  .tile .badge span{background:rgba(0,0,0,.55);border-radius:999px;padding:.1rem .35rem;font-size:.72rem}
  #bar{display:flex;align-items:center;justify-content:center;gap:.5rem;padding:.6rem;background:var(--bar);border-top:1px solid var(--bd);flex-shrink:0;flex-wrap:wrap}
  button{background:#1c1c25;border:1px solid var(--bd2);color:var(--fg);border-radius:10px;padding:.5rem .8rem;font:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:.4rem}
  button:hover{border-color:var(--acc)}
  button.off{background:#2a1620;border-color:#5a2030;color:#ff9aa6}
  button.leave{background:#3a1620;border-color:#5a2030;color:#ff9aa6}
  button.leave:hover{background:#4a1a26}
  button.pri{background:var(--acc);border-color:var(--acc);color:#fff}button.pri:hover{background:#6c4dff}
  #msg{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:.8rem;text-align:center;padding:2rem;background:var(--bg)}
  #msg h2{margin:0;font-size:1.3rem}#msg p{color:var(--mut);margin:0;max-width:30rem}
  #msg a{color:var(--acc2)}
  .toast{position:fixed;left:50%;bottom:5rem;transform:translateX(-50%);background:#1c1c25;border:1px solid var(--bd2);
    color:var(--fg);padding:.5rem .9rem;border-radius:10px;font-size:.85rem;opacity:0;transition:opacity .2s;pointer-events:none;z-index:60}
  .toast.on{opacity:1}
  .hint{color:var(--mut);font-size:.82rem;text-align:center;padding:.2rem .6rem}
</style>
</head>
<body>
  <header>
    <a class="home" id="home" title="noet">◐ noet</a>
    <span class="ttl">Звонок</span>
    <span class="cnt" id="cnt"></span>
    <span class="sp"></span>
    <button id="invite" class="pri">Пригласить</button>
  </header>
  <div id="grid"></div>
  <div class="hint" id="hint"></div>
  <div id="bar">
    <button id="mic">🎙 Микрофон</button>
    <button id="cam">🎥 Камера</button>
    <button id="screen">🖥 Показать экран</button>
    <button id="leave" class="leave">Выйти</button>
  </div>
  <div id="msg"></div>
  <div class="toast" id="toast"></div>
<script type="module" src="call.js"></script>
</body></html>
