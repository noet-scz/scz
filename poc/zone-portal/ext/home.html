<!doctype html>
<html lang="ru"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>noet</title>
<style>
  :root{--bg:#0a0a0d;--panel:#111118;--panel2:#16161f;--bd:#24242e;--bd2:#2f2f3a;--fg:#f1f1f5;--mut:#9595a3;--acc:#7c5cff;--acc2:#9d8bff}
  *{box-sizing:border-box}html,body{margin:0;height:100%}
  body{background:radial-gradient(120% 75% at 50% -8%,#16121f 0%,transparent 60%) fixed,var(--bg);color:var(--fg);font:16px/1.55 -apple-system,system-ui,Segoe UI,sans-serif;-webkit-font-smoothing:antialiased}
  .stage{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:clamp(4rem,16vh,10rem) 1.2rem 4rem;max-width:42rem;margin:0 auto}
  .mark{display:flex;align-items:center;gap:.7rem;margin-bottom:1.8rem}
  .mark img{width:52px;height:52px}.mark h1{font-size:2.6rem;margin:0;font-weight:680;letter-spacing:-.5px}
  form{width:100%;display:flex;gap:.5rem}
  #q{flex:1;font-size:1.05rem;background:var(--panel2);border:1px solid var(--bd2);color:var(--fg);border-radius:14px;padding:.95rem 1.1rem;outline:none;transition:border-color .15s,box-shadow .15s}
  #q:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(124,92,255,.18)}
  #q::placeholder{color:#5b5b6a}
  .go{background:var(--acc);border:0;border-radius:14px;color:#fff;padding:0 1.3rem;cursor:pointer;font-weight:600}.go:hover{background:#6b4dff}
  .quick{margin-top:1.4rem;display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center}
  .quick a{font-size:.9rem;color:var(--mut);background:var(--panel2);border:1px solid var(--bd);border-radius:999px;padding:.4rem 1rem;text-decoration:none}
  .quick a:hover{border-color:var(--acc);color:var(--fg)}
  .hint{color:var(--mut);font-size:.86rem;margin-top:1.6rem;text-align:center}
</style></head>
<body>
<div class="stage">
  <div class="mark"><img src="logo.svg" alt=""><h1>noet</h1></div>
  <form id="f" autocomplete="off">
    <input id="q" placeholder="имя в noet, напр. nyx" autofocus>
    <button class="go" type="submit">Открыть</button>
  </form>
  <div class="quick">
    <a id="mine" href="#">Моя страница</a>
    <a id="people" href="#">Люди</a>
    <a id="feed" href="#">Лента</a>
    <a id="dev" href="#">Разработчикам</a>
  </div>
  <div class="hint">Впиши имя и открой его страницу. Свободный интернет, который тебе принадлежит.</div>
</div>
<script src="home.js"></script>
</body></html>
