<!doctype html>
<html lang="ru"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Лента · noet</title>
<style>
  :root{--bg:#0a0a0d;--panel:#111118;--panel2:#16161f;--bd:#24242e;--bd2:#2f2f3a;--fg:#f1f1f5;--mut:#9595a3;--acc:#7c5cff;--acc2:#9d8bff;--ok:#3ddc97}
  *{box-sizing:border-box}html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--fg);font:15px/1.5 -apple-system,system-ui,Segoe UI,sans-serif;-webkit-font-smoothing:antialiased}
  .app{display:flex;flex-direction:column;height:100%;max-width:46rem;margin:0 auto}
  header{display:flex;align-items:center;gap:.6rem;padding:.8rem 1.1rem;border-bottom:1px solid var(--bd)}
  header img{width:26px;height:26px}header b{font-size:1.05rem}
  header .nav{margin-left:auto;font-size:.86rem}header .nav a{color:var(--acc2);margin-left:1rem;text-decoration:none}
  #log{flex:1;overflow-y:auto;padding:.8rem 1.1rem;display:flex;flex-direction:column;gap:.1rem}
  .m{display:flex;gap:.65rem;padding:.35rem 0;border-radius:8px}
  .m.flash{background:rgba(124,92,255,.12)}
  .m .av{width:38px;height:38px;border-radius:50%;flex:0 0 38px;object-fit:cover;margin-top:.1rem}
  .m .b{min-width:0;flex:1}.m .h{display:flex;align-items:baseline;gap:.5rem}
  .m .nm{font-weight:650;font-size:.95rem}.m.me .nm{color:var(--acc2)}
  .m .tm{color:var(--mut);font-size:.72rem}
  .m .reply{margin-left:auto;background:0;border:0;color:var(--mut);cursor:pointer;font-size:.78rem;opacity:0;transition:.12s}
  .m:hover .reply{opacity:1}.m .reply:hover{color:var(--acc2)}
  .m .refto{font-size:.78rem;color:var(--mut);cursor:pointer;margin-bottom:.1rem}.m .refto:hover{color:var(--acc2)}
  .m .tx{color:#dcdce4;white-space:pre-wrap;word-wrap:break-word;font-size:.97rem}
  .m .tx a{color:var(--acc2)}.m .tx a.mention{font-weight:600;text-decoration:none}
  .m .tx img.img{max-width:300px;max-height:300px;border-radius:10px;margin-top:.35rem;display:block;border:1px solid var(--bd)}
  .day{align-self:center;color:var(--mut);font-size:.74rem;background:var(--panel2);border:1px solid var(--bd);border-radius:999px;padding:.1rem .7rem;margin:.6rem 0}
  .mut{color:var(--mut)}
  footer{padding:.7rem 1.1rem;border-top:1px solid var(--bd)}
  .replybar{display:flex;align-items:center;gap:.5rem;font-size:.82rem;color:var(--mut);padding:.2rem .2rem .5rem}
  .replybar b{color:var(--acc2);font-weight:650}.replybar button{margin-left:auto;background:0;border:0;color:var(--mut);cursor:pointer;font-size:1rem}
  .composer{display:flex;gap:.5rem;position:relative}
  .composer input{flex:1;background:var(--panel2);border:1px solid var(--bd2);color:var(--fg);border-radius:12px;padding:.7rem .9rem;outline:none}
  .composer input:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(124,92,255,.18)}
  .composer button{background:var(--acc);border:0;border-radius:12px;color:#fff;padding:0 1.2rem;font-weight:600;cursor:pointer}
  .composer button:disabled{opacity:.5;cursor:default}
  .ac{position:absolute;bottom:100%;left:0;margin-bottom:.3rem;background:var(--panel2);border:1px solid var(--bd);border-radius:10px;overflow:hidden;min-width:11rem;box-shadow:0 12px 40px rgba(0,0,0,.5)}
  .ac div{padding:.4rem .7rem;cursor:pointer;font-size:.9rem}.ac div.on,.ac div:hover{background:var(--acc);color:#fff}
</style></head>
<body><div class="app">
  <header><img src="logo.svg" alt=""><b>Лента</b>
    <span class="nav"><a id="lhome" href="#">Главная</a><a id="lpeople" href="#">Люди</a></span></header>
  <div id="log"><div class="mut" style="text-align:center;padding:2rem">загружаю…</div></div>
  <footer id="foot"></footer>
</div>
<script type="module" src="feed.js"></script>
</body></html>
