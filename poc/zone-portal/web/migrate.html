<!doctype html><html lang=ru><head>
<meta charset=utf-8><title>noet · перенос ключа</title>
<link rel=icon href="/logo.svg">
<style>body{font:16px/1.6 system-ui;background:#0a0a0c;color:#ececf2;max-width:32rem;margin:6rem auto;padding:0 1.2rem}
.card{background:#101016;border:1px solid #23232c;border-radius:16px;padding:1.5rem}
h1{font-size:1.3rem;margin:0 0 .6rem}.mut{color:#8b8b98;font-size:.9rem}
.btn{display:block;width:100%;margin-top:1rem;background:#7c5cff;border:0;border-radius:12px;color:#fff;padding:.85rem;font-size:1rem;font-weight:600;cursor:pointer}
.ok{background:#0f2620;border:1px solid #1c5c45;border-radius:10px;padding:.7rem 1rem;margin-top:1rem;color:#5fd0a8}</style></head>
<body><div class=card>
<h1>Перенос ключа</h1>
<p class=mut>Зона переехала на новый домен. Нажми кнопку — ключ автоматически перенесётся в id.nt.</p>
<div id=msg></div>
<button class=btn id=go>Перенести ключ в id.nt</button>
</div>
<script>
const msg = document.getElementById('msg');
const sk = localStorage.getItem('noet_sk');
const tok = localStorage.getItem('noet_token');
const prof = localStorage.getItem('noet_profile');
if (!sk) { msg.innerHTML='<p style="color:#ff8b8b">Ключ не найден в этом браузере (id.noet.nt).<br>Импортируй его вручную на <a href="http://id.nt/" style="color:#9d8bff">id.nt</a>.</p>'; document.getElementById('go').style.display='none'; }
document.getElementById('go').onclick = function() {
  // Открываем id.nt и отправляем ключ через postMessage
  const w = window.open('http://id.nt/?migrate=1', 'noet-id');
  const handler = function(e) {
    if (e.origin !== 'http://id.nt') return;
    if (e.data && e.data.__noet === 1 && e.data.ev === 'ready_migrate') {
      w.postMessage({ __noet: 1, ev: 'migrate', sk, tok, prof }, 'http://id.nt');
      window.removeEventListener('message', handler);
      msg.innerHTML = '<div class=ok>Ключ перенесён. Теперь можешь <a href="http://id.nt/" style="color:#9d8bff">войти на id.nt</a>.</div>';
      document.getElementById('go').style.display = 'none';
      setTimeout(() => { try { w.close(); } catch {} }, 1500);
    }
  };
  window.addEventListener('message', handler);
};
</script></body></html>
