<!doctype html><html lang=ru><head>
<meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1">
<title>noet · личность</title>
<link rel=icon href="/logo.svg"><link rel=stylesheet href="/app.css">
<style>
  .hd{max-width:34rem;margin:0 auto;display:flex;align-items:center;padding:1.1rem 1.2rem}
  .hd .brand{color:var(--fg);text-decoration:none}
  .hd .brand b{font-size:1.05rem}
  .lang{display:flex;gap:.2rem;background:var(--panel2);border:1px solid var(--bd);border-radius:999px;padding:.15rem}
  .lang button{background:0;border:0;color:var(--mut);border-radius:999px;padding:.2rem .6rem;font-size:.8rem;cursor:pointer}
  .lang button.on{background:var(--acc);color:#fff}
  .wrap{max-width:34rem;margin:0 auto;padding:1rem 1.2rem 4rem;display:flex;flex-direction:column;gap:1rem}
  .card{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--bd);border-radius:16px;padding:1.4rem;box-shadow:0 8px 30px rgba(0,0,0,.32)}
  h1{font-size:1.55rem;letter-spacing:-.3px;margin:0 0 .4rem}h2{font-size:1.05rem;margin:0 0 .6rem}
  .mut{color:var(--mut);font-size:.92rem}
  label{display:block;color:var(--mut);font-size:.82rem;margin:.9rem 0 .35rem}
  input,textarea{width:100%;font-size:.97rem}textarea{min-height:60px;resize:vertical}
  .btn{width:100%;margin-top:1rem;background:var(--acc);border:0;border-radius:12px;color:#fff;padding:.8rem;font-size:1rem;font-weight:600;cursor:pointer}
  .btn:hover{background:#6c4dff}
  .btn.big{padding:.95rem;font-size:1.05rem}
  .btn.ghost{background:var(--panel2);border:1px solid var(--bd);color:var(--fg);font-weight:500}
  .lnk{background:0;border:0;color:var(--acc2);cursor:pointer;font-size:.9rem;padding:.3rem 0}
  .lnk.danger{color:#ff8b8b;display:block;margin-top:.6rem}
  .or{margin-top:.8rem;text-align:center}
  .hide{display:none}
  .ok{background:#0f2620;border:1px solid #1c5c45;border-radius:10px;padding:.6rem .8rem;color:var(--ok);font-size:.9rem;margin:.4rem 0}
  .msg{font-size:.88rem;margin-top:.6rem;min-height:1.1em}.msg.err{color:#ff8b8b}.msg.ok{color:var(--ok)}
  .phd{display:flex;align-items:center;gap:1rem;margin-bottom:.4rem}
  .bigav{width:64px;height:64px;border-radius:50%}
  .dn{font-size:1.2rem;font-weight:650}
  .row2{display:flex;gap:.6rem;align-items:center}.row2>*{flex:1;margin-top:0}
  .sep{height:1px;background:var(--bd);margin:1rem 0}
  code{background:#000;border:1px solid var(--bd);border-radius:5px;padding:.1em .4em;font-size:.8rem;word-break:break-all}
  .key{margin-top:.8rem}
  /* редактор — полноэкранный layout */
  .ed-page{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg)}
  .ed-bar{display:flex;align-items:center;gap:.8rem;padding:.55rem 1.2rem;border-bottom:1px solid var(--bd);flex-shrink:0}
  .ed-bar-url{color:var(--mut);font-size:.85rem}
  .ed-mode-toggle{margin-left:auto;display:flex;background:var(--panel2);border:1px solid var(--bd);border-radius:8px;overflow:hidden}
  .ed-mode-toggle button{background:none;border:none;color:var(--mut);padding:.28rem .85rem;font-size:.83rem;cursor:pointer}
  .ed-mode-toggle button.active{background:var(--acc);color:#fff}
  .ed-pub-btn{width:auto;margin:0;padding:.45rem 1.3rem;font-size:.9rem}
  .ed-title-full{width:100%;font-size:1.9rem;font-weight:700;padding:.9rem 1.5rem .3rem;background:transparent;border:none;outline:none;color:var(--fg);flex-shrink:0}
  .ed-area{flex:1;width:100%;resize:none;font-size:1rem;line-height:1.72;padding:.5rem 1.5rem 1rem;background:transparent;border:none;outline:none;color:var(--fg)}
  .ed-code{font-family:ui-monospace,monospace;font-size:.9rem;line-height:1.55;tab-size:2}
  .ed-deploy{flex:1;overflow-y:auto;padding:2rem 1.2rem 4rem;display:flex;justify-content:center}
  .dp-card{width:100%;max-width:34rem}
  .dp-card h2{font-size:1.3rem;margin:0 0 1.3rem}
  .dp-field{margin-bottom:1.1rem}
  .dp-field>label{display:block;font-size:.82rem;color:var(--mut);margin-bottom:.4rem}
  .dp-field input,.dp-field select{width:100%;background:var(--card);border:1px solid var(--bd);border-radius:9px;color:var(--fg);padding:.62rem .8rem;font:14px/1.4 system-ui,sans-serif;outline:none}
  .dp-field input:focus,.dp-field select:focus{border-color:var(--acc)}
  .dp-grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
  .dp-name{display:flex;align-items:stretch;background:var(--card);border:1px solid var(--bd);border-radius:9px;overflow:hidden}
  .dp-name input{border:0;border-radius:0;background:transparent}
  .dp-name span{display:flex;align-items:center;padding:0 .8rem;color:var(--mut);background:var(--panel2);border-left:1px solid var(--bd);font-size:.9rem}
  .dp-select{position:relative}
  .dp-select select{appearance:none;cursor:pointer}
  .dp-select::after{content:'▾';position:absolute;right:.85rem;top:50%;transform:translateY(-50%);color:var(--mut);pointer-events:none}
  .dp-sec{border:1px solid var(--bd);border-radius:10px;margin-bottom:1.1rem;background:var(--card)}
  .dp-sec>summary{cursor:pointer;padding:.8rem 1rem;font-weight:600;font-size:.92rem;list-style:none}
  .dp-sec>summary::-webkit-details-marker{display:none}
  .dp-sec>summary::before{content:'▸';color:var(--mut);margin-right:.5rem}
  .dp-sec[open]>summary::before{content:'▾'}
  .dp-sec>.dp-field,.dp-sec>p,.dp-sec>#dp_envs,.dp-sec>.dp-addenv{margin-left:1rem;margin-right:1rem}
  .dp-sec[open]{padding-bottom:.6rem}
  .dp-hint{color:var(--mut);font-size:.8rem;margin:.5rem 0 0}
  .dp-env{display:grid;grid-template-columns:1fr 1fr auto;gap:.5rem;margin-bottom:.5rem}
  .dp-env input{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:8px;color:var(--fg);padding:.5rem .7rem;font:13px ui-monospace,monospace;outline:none}
  .dp-envdel{background:0;border:0;color:var(--mut);cursor:pointer;font-size:1rem}
  .dp-envdel:hover{color:#ff6b6b}
  .dp-addenv{background:0;border:0;color:var(--acc2);cursor:pointer;font-size:.85rem;padding:.2rem 0}
  .dp-folder{width:100%;background:var(--card);border:1px dashed var(--bd);border-radius:10px;color:var(--fg);padding:1.2rem;font-size:.95rem;cursor:pointer;text-align:center;font-weight:600}
  .dp-folder:hover{border-color:var(--acc)}
  .dp-folder.has{border-style:solid;border-color:var(--ok);color:var(--ok)}
  .ed-pick{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.6rem;padding:2rem}
  .ed-pick h2{font-size:1.4rem;margin:0}
  .ed-pick-row{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
  .ed-pick-card{width:14rem;min-height:8.5rem;display:flex;flex-direction:column;gap:.5rem;justify-content:center;align-items:flex-start;text-align:left;background:var(--card);border:1px solid var(--bd);border-radius:14px;color:var(--fg);padding:1.3rem;cursor:pointer;transition:.12s}
  .ed-pick-card:hover{border-color:var(--acc);transform:translateY(-2px)}
  .ed-pick-card b{font-size:1.15rem}
  .ed-pick-card span{color:var(--mut);font-size:.88rem;font-weight:400}
  .ed-changetype{margin-left:1rem}
  .dp-dd{position:relative}
  .dp-dd-btn{width:100%;display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--bd);border-radius:9px;color:var(--fg);padding:.62rem .8rem;font:14px system-ui,sans-serif;cursor:pointer}
  .dp-dd-btn:hover{border-color:var(--acc)}
  .dp-dd-arr{color:var(--mut);margin-left:.5rem}
  .dp-dd-list{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:30;background:var(--panel);border:1px solid var(--bd);border-radius:9px;box-shadow:0 18px 50px rgba(0,0,0,.6);max-height:15rem;overflow-y:auto;padding:4px}
  .dp-dd-opt{padding:.55rem .7rem;border-radius:7px;cursor:pointer;color:var(--fg);font-size:.92rem}
  .dp-dd-opt:hover{background:var(--panel2)}
  .dp-dd-opt.on{background:var(--acc);color:#fff}
  .ed-status{padding:.35rem 1.5rem;border-top:1px solid var(--bd);flex-shrink:0;min-height:1.8rem}
</style></head><body>
<div id=app><div class=wrap><div class=card><div class=mut>…</div></div></div></div>
<script src="/i18n.js"></script>
<script type="module" src="/account.js"></script>
</body></html>
