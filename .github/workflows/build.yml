name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux
          - os: windows-latest
            name: windows
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: app
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
      - name: System deps (Linux)
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev build-essential libssl-dev file patchelf
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri
      - run: npm install
      - run: npx tauri icon src-tauri/icons/icon-source.png
      - name: cargo test
        working-directory: app/src-tauri
        run: cargo test --locked || cargo test
      - name: Disable updater artifacts when signing key is absent
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            python -c "import json; from pathlib import Path; p=Path('src-tauri/tauri.conf.json'); data=json.loads(p.read_text()); data.setdefault('bundle', {})['createUpdaterArtifacts']=False; p.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n')"
          fi
      - name: Build
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Collect bundles
        if: always()
        shell: bash
        run: |
          mkdir -p ../out
          find src-tauri/target/release/bundle -type f \
            \( -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' -o -name '*.msi' -o -name '*.exe' \) \
            -exec cp {} ../out/ \; || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scz-${{ matrix.name }}
          path: out/*
          if-no-files-found: warn
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/out/*

  android:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: app
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install NDK
        run: |
          sdkmanager "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri
      - run: npm install
      - run: npx tauri icon src-tauri/icons/icon-source.png
      - name: Disable updater artifacts when signing key is absent
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            python -c "import json; from pathlib import Path; p=Path('src-tauri/tauri.conf.json'); data=json.loads(p.read_text()); data.setdefault('bundle', {})['createUpdaterArtifacts']=False; p.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n')"
          fi
      - run: npx tauri android init
      - run: npx tauri android build --apk --debug
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Collect APK
        if: always()
        shell: bash
        run: |
          mkdir -p ../out
          find src-tauri/gen/android -name '*.apk' -exec cp {} ../out/ \; || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scz-android
          path: out/*.apk
          if-no-files-found: warn
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/out/*.apk
