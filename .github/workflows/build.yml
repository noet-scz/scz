name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Автоматически создаёт тег v0.1.x при каждом пуше в main (кроме chore: v* коммитов).
  # Тег запускает release.yml, который собирает и публикует релиз.
  bump-version:
    if: "github.ref == 'refs/heads/main' && !startsWith(github.event.head_commit.message, 'chore: v') && github.event_name == 'push'"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Вычислить и создать следующий тег patch-версии
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # Текущая версия из package.json
          BASE=$(node -e "console.log(require('./app/package.json').version)")

          # Последний тег (может быть новее base, если уже бампили)
          LATEST=$(git tag -l 'v*' | sort -V | tail -1)
          if [ -n "$LATEST" ]; then
            TAG_VER="${LATEST#v}"
            # Берём максимум из base и последнего тега
            BASE_MAJOR=$(echo $BASE | cut -d. -f1)
            BASE_MINOR=$(echo $BASE | cut -d. -f2)
            BASE_PATCH=$(echo $BASE | cut -d. -f3)
            TAG_MAJOR=$(echo $TAG_VER | cut -d. -f1)
            TAG_MINOR=$(echo $TAG_VER | cut -d. -f2)
            TAG_PATCH=$(echo $TAG_VER | cut -d. -f3)
            # Если тег >= base — бампим от тега
            if [ "$TAG_MAJOR" -gt "$BASE_MAJOR" ] || \
               ([ "$TAG_MAJOR" -eq "$BASE_MAJOR" ] && [ "$TAG_MINOR" -gt "$BASE_MINOR" ]) || \
               ([ "$TAG_MAJOR" -eq "$BASE_MAJOR" ] && [ "$TAG_MINOR" -eq "$BASE_MINOR" ] && [ "$TAG_PATCH" -ge "$BASE_PATCH" ]); then
              MAJOR=$TAG_MAJOR; MINOR=$TAG_MINOR; PATCH=$TAG_PATCH
            else
              MAJOR=$BASE_MAJOR; MINOR=$BASE_MINOR; PATCH=$BASE_PATCH
            fi
          else
            MAJOR=$(echo $BASE | cut -d. -f1)
            MINOR=$(echo $BASE | cut -d. -f2)
            PATCH=$(echo $BASE | cut -d. -f3)
          fi

          NEW_VER="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "NEW_VER=$NEW_VER" >> $GITHUB_ENV

          # Проверить что такого тега ещё нет
          if git rev-parse "v$NEW_VER" >/dev/null 2>&1; then
            echo "Тег v$NEW_VER уже существует, пропуск"
            exit 0
          fi

          git tag "v$NEW_VER"
          git push origin "v$NEW_VER"
          echo "Создан тег v$NEW_VER"

  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux
          - os: windows-latest
            name: windows
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: app
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
      - name: System deps (Linux)
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev build-essential libssl-dev file patchelf
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri
      - run: npm install
      - run: npx tauri icon src-tauri/icons/icon-source.png
      - name: cargo test
        working-directory: app/src-tauri
        run: cargo test --locked || cargo test
      - name: Disable updater artifacts when signing key is absent
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            node -e "const fs=require('fs'); const p='src-tauri\/tauri.conf.json'; const data=JSON.parse(fs.readFileSync(p,'utf8')); data.bundle=data.bundle||{}; data.bundle.createUpdaterArtifacts=false; fs.writeFileSync(p, JSON.stringify(data,null,2)+'\n');"
          fi
      - name: Build
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Collect bundles
        if: always()
        shell: bash
        run: |
          mkdir -p ../out
          find src-tauri/target/release/bundle -type f \
            \( -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' -o -name '*.msi' -o -name '*.exe' \) \
            -exec cp {} ../out/ \; || true
          cd ../out
          for f in *; do [ -e "$f" ] || continue; nf=$(echo "$f" | sed 's/^SCZ/noet/; s/^scz/noet/; s/app-universal-debug/noet-0.1.0-universal-debug/'); [ "$f" = "$nf" ] || mv "$f" "$nf"; done
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: noet-${{ matrix.name }}
          path: out/*
          if-no-files-found: warn
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/out/*

  android:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: app
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install NDK
        run: |
          sdkmanager "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri
      - run: npm install
      - run: npx tauri icon src-tauri/icons/icon-source.png
      - name: Disable updater artifacts when signing key is absent
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            node -e "const fs=require('fs'); const p='src-tauri\/tauri.conf.json'; const data=JSON.parse(fs.readFileSync(p,'utf8')); data.bundle=data.bundle||{}; data.bundle.createUpdaterArtifacts=false; fs.writeFileSync(p, JSON.stringify(data,null,2)+'\n');"
          fi
      - run: npx tauri android init
      - name: Inject release signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > /tmp/noet.keystore
            cat >> src-tauri/gen/android/app/build.gradle.kts << 'KTSEOF'

          // Release signing — injected by CI
          if (System.getenv("ANDROID_KEYSTORE_PATH") != null) {
              android {
                  signingConfigs {
                      create("release") {
                          storeFile = file(System.getenv("ANDROID_KEYSTORE_PATH")!!)
                          storePassword = System.getenv("ANDROID_KEYSTORE_PASSWORD")!!
                          keyAlias = System.getenv("ANDROID_KEY_ALIAS")!!
                          keyPassword = System.getenv("ANDROID_KEY_PASSWORD")!!
                      }
                  }
                  buildTypes {
                      getByName("release") {
                          signingConfig = signingConfigs.getByName("release")
                      }
                  }
              }
          }
          KTSEOF
          fi
      - name: Build APK
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PATH: /tmp/noet.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            npx tauri android build --apk
          else
            npx tauri android build --apk --debug
          fi
      - name: Collect APK
        if: always()
        shell: bash
        run: |
          mkdir -p ../out
          VERSION=$(node -e "console.log(require('./src-tauri/tauri.conf.json').version)")
          apk=$(find src-tauri/gen/android -name '*.apk' | grep -v '\-unsigned' | head -1 || true)
          if [ -n "$apk" ]; then
            if echo "$apk" | grep -q debug; then
              cp "$apk" "../out/noet-${VERSION}-debug.apk"
            else
              cp "$apk" "../out/noet-${VERSION}.apk"
            fi
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: noet-android
          path: out/*.apk
          if-no-files-found: warn
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/out/*.apk
