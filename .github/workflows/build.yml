name: build

# Сборка клиента SCZ под Windows, Linux и Android.
# - push в main / PR: проверка сборки desktop + cargo тесты.
# - тег v*: полная сборка всех платформ + публикация в Release.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------- Desktop: Linux + Windows ----------
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux
          - os: windows-latest
            name: windows
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: System deps (Linux)
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev build-essential libssl-dev file patchelf

      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - run: npm install
      - name: Generate icons
        run: npx tauri icon src-tauri/icons/icon-source.png

      - name: cargo test (crypto/identity)
        working-directory: app/src-tauri
        run: cargo test --locked || cargo test

      - name: Build
        run: npx tauri build
        env:
          # Для self-update артефактов: включи createUpdaterArtifacts в tauri.conf.json
          # и добавь эти секреты в репозиторий (Settings → Secrets → Actions).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Collect bundles
        if: always()
        shell: bash
        run: |
          mkdir -p ../out
          find src-tauri/target/release/bundle -type f \
            \( -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' -o -name '*.msi' -o -name '*.exe' \) \
            -exec cp {} ../out/ \; || true

      - uses: actions/upload-artifact@v4
        with:
          name: scz-${{ matrix.name }}
          path: out/*
          if-no-files-found: warn

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/out/*

  # ---------- Android ----------
  android:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - run: npm install
      - run: npx tauri icon src-tauri/icons/icon-source.png

      - name: Android init
        run: npx tauri android init

      - name: Build APK (debug, installable via sideload)
        run: npx tauri android build --apk --debug

      - name: Collect APK
        if: always()
        shell: bash
        run: |
          mkdir -p ../out
          find src-tauri/gen/android -name '*.apk' -exec cp {} ../out/ \; || true

      - uses: actions/upload-artifact@v4
        with:
          name: scz-android
          path: out/*.apk
          if-no-files-found: warn

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/out/*.apk
