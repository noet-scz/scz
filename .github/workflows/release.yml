name: release

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux
            bundle: appimage,deb,rpm
          - os: windows-latest
            name: windows
            bundle: nsis,msi
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: app
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
      - name: System deps (Linux)
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev build-essential libssl-dev file patchelf
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri
      - run: npm install
      - run: npx tauri icon src-tauri/icons/icon-source.png
      - name: cargo test
        working-directory: app/src-tauri
        run: cargo test --locked || cargo test
      - name: Disable updater artifacts when signing key is absent
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            node -e "const fs=require('fs'); const p='src-tauri\/tauri.conf.json'; const data=JSON.parse(fs.readFileSync(p,'utf8')); data.bundle=data.bundle||{}; data.bundle.createUpdaterArtifacts=false; fs.writeFileSync(p, JSON.stringify(data,null,2)+'\n');"
          fi
      - name: Build
        run: npx tauri build --bundles ${{ matrix.bundle }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Collect bundles
        if: always()
        shell: bash
        run: |
          mkdir -p ../out
          find src-tauri/target/release/bundle -type f \
            \( -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' -o -name '*.msi' -o -name '*.exe' \) \
            -exec cp {} ../out/ \; || true
          cd ../out
          for f in *; do [ -e "$f" ] || continue; nf=$(echo "$f" | sed 's/^SCZ/noet/; s/^scz/noet/; s/app-universal-debug/noet-0.1.0-universal-debug/'); [ "$f" = "$nf" ] || mv "$f" "$nf"; done
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: noet-${{ matrix.name }}
          path: out/*
          if-no-files-found: warn
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/out/*

  android:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: app
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install NDK
        run: |
          sdkmanager "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri
      - run: npm install
      - run: npx tauri icon src-tauri/icons/icon-source.png
      - name: Disable updater artifacts when signing key is absent
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            node -e "const fs=require('fs'); const p='src-tauri\/tauri.conf.json'; const data=JSON.parse(fs.readFileSync(p,'utf8')); data.bundle=data.bundle||{}; data.bundle.createUpdaterArtifacts=false; fs.writeFileSync(p, JSON.stringify(data,null,2)+'\n');"
          fi
      - run: npx tauri android init
      - run: npx tauri android build --apk --debug
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Collect APK
        if: always()
        shell: bash
        run: |
          mkdir -p ../out
          apk=$(find src-tauri/gen/android -name '*.apk' | head -1 || true)
          if [ -n "$apk" ]; then cp "$apk" ../out/noet-0.1.0-universal-debug.apk; fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: noet-android
          path: out/*.apk
          if-no-files-found: warn
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/out/*.apk
